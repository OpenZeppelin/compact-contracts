name: PR Lifecycle

on:
  pull_request_target:
    types: [opened, reopened, converted_to_draft, ready_for_review, closed]

permissions: {}

jobs:
  pr-lifecycle:
    uses: OpenZeppelin/midnight-handbook/.github/workflows/pr-lifecycle-template.yml@77d4dd0f93bc8a023e61e03e46eac5d6d532b4d5 # main as of 2026-02-25
    secrets:
      PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
